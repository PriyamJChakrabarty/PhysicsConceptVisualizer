<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Web Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        
        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%; /* reduced from 80% to make panels smaller */
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }
        
        .title {
            color: #fff;
            text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.7),
                        -2px -2px 0 #ff9500,
                        2px -2px 0 #ff9500,
                        -2px 2px 0 #ff9500,
                        2px 2px 0 #ff9500;
            font-size: 4rem;
            margin-bottom: 40px;
            animation: bounce 2s infinite;
            letter-spacing: 2px;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .panels {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
        }
        
        .panel {
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            padding: 15px; /* reduced from 20px */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-align: center;
            border: 4px solid #4a90e2;
        }
        
        .panel:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
            border-color: #ff9500;
        }
        
        .panel img {
            width: 75%;
            height: 75%;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 3px solid #ff9500;
        }
        
        .panel h3 {
            margin: 0;
            color: #333;
            font-size: 1.4rem;
        }
        
        /* Add some responsive styles */
        @media (max-width: 900px) {
            .panels {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(3, 1fr);
            }
            
            .title {
                font-size: 3rem;
            }
        }
        
        @media (max-width: 600px) {
            .panels {
                grid-template-columns: 1fr;
            }
            
            .title {
                font-size: 2.5rem;
            }
            
            .panel img {
                width: 75%;
                height: 75%;
            }
        }
    </style>
</head>
<body>
    <div id="scene-container"></div>
    
    <div class="container">
        <h1 class="title">Physics Web Visualizer</h1>
        
        <div class="panels">
            <div class="panel" onclick="window.location.href='page1.html'">
                <img src="img1.png" alt="Buoyancy">
                <h3>Buoyancy</h3>
            </div>
            
            <div class="panel" onclick="window.location.href='page2.html'">
                <img src="img2.png" alt="Circular Motion">
                <h3>Circular Motion</h3>
            </div>
            
            <div class="panel" onclick="window.location.href='page3.html'">
                <img src="img3.png" alt="Simple Pendulum">
                <h3>Simple Pendulum</h3>
            </div>
            
            <div class="panel" onclick="window.location.href='page4.html'">
                <img src="img4.png" alt="Spring Mass System">
                <h3>Spring Mass System</h3>
            </div>
            
            <div class="panel" onclick="window.location.href='page5.html'">
                <img src="img5.png" alt="Relative Motion">
                <h3>Relative Motion</h3>
            </div>
            
            <div class="panel" onclick="window.location.href='page6.html'">
                <img src="img6.png" alt="Projectile Motion">
                <h3>Projectile Motion</h3>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Main Three.js scene setup
        const scene = new THREE.Scene();
        const container = document.getElementById('scene-container');
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87CEEB); // Sky blue background
        container.appendChild(renderer.domElement);
        
        // Create lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);
        
        // Create the ground (green grass)
        const groundGeometry = new THREE.PlaneGeometry(100, 100);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x7CFC00, // Bright green for grass
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2; // Rotate to horizontal
        ground.position.y = -5;
        scene.add(ground);
        
        // Create trees function
        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            
            // Tree trunk
            const trunkGeometry = new THREE.CylinderGeometry(0.5, 0.7, 2.5, 8);
            const trunkMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x8B4513, // Brown
                roughness: 0.9
            });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 1.25;
            treeGroup.add(trunk);
            
            // Tree leaves (made of cones)
            const leavesGeometry1 = new THREE.ConeGeometry(2, 3, 8);
            const leavesMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x228B22, // Forest green
                roughness: 0.7
            });
            const leaves1 = new THREE.Mesh(leavesGeometry1, leavesMaterial);
            leaves1.position.y = 3.5;
            treeGroup.add(leaves1);
            
            const leavesGeometry2 = new THREE.ConeGeometry(1.6, 2.5, 8);
            const leaves2 = new THREE.Mesh(leavesGeometry2, leavesMaterial);
            leaves2.position.y = 5;
            treeGroup.add(leaves2);
            
            const leavesGeometry3 = new THREE.ConeGeometry(1.2, 2, 8);
            const leaves3 = new THREE.Mesh(leavesGeometry3, leavesMaterial);
            leaves3.position.y = 6.2;
            treeGroup.add(leaves3);
            
            // Position the tree at ground level
            treeGroup.position.set(x, -5, z);
            return treeGroup;
        }
        
        // Add trees around the scene
        for (let i = 0; i < 20; i++) {
            const theta = Math.random() * Math.PI * 2;
            const radius = 25 + Math.random() * 20;
            const x = Math.cos(theta) * radius;
            const z = Math.sin(theta) * radius;
            const tree = createTree(x, z - 20);
            
            // Add some randomness to each tree
            const scale = 0.7 + Math.random() * 0.8;
            tree.scale.set(scale, scale, scale);
            tree.rotation.y = Math.random() * Math.PI * 2;
            
            scene.add(tree);
        }
        
        // Create mountains
        function createMountain(x, z, scale) {
            const mountainGeometry = new THREE.ConeGeometry(8, 15, 8);
            const mountainMaterial = new THREE.MeshStandardMaterial({
                color: 0x808080, // Gray
                roughness: 1.0
            });
            const mountain = new THREE.Mesh(mountainGeometry, mountainMaterial);
            
            // Add snow cap
            const snowCapGeometry = new THREE.ConeGeometry(5, 3, 8);
            const snowMaterial = new THREE.MeshStandardMaterial({
                color: 0xFFFFFF, // White
                roughness: 0.5
            });
            const snowCap = new THREE.Mesh(snowCapGeometry, snowMaterial);
            snowCap.position.y = 7;
            mountain.add(snowCap);
            
            // Position and scale mountain
            mountain.position.set(x, 0, z);
            mountain.scale.set(scale, scale, scale);
            return mountain;
        }
        
        // Add mountains to the background
        const mountainPositions = [
            { x: -40, z: -60, scale: 1.5 },
            { x: -20, z: -65, scale: 2.0 },
            { x: 0, z: -70, scale: 2.5 },
            { x: 20, z: -65, scale: 2.0 },
            { x: 40, z: -60, scale: 1.5 },
            { x: -30, z: -50, scale: 1.2 },
            { x: 30, z: -50, scale: 1.2 },
        ];
        
        mountainPositions.forEach(pos => {
            const mountain = createMountain(pos.x, pos.z, pos.scale);
            scene.add(mountain);
        });
        
        // Create clouds
        function createCloud(x, y, z) {
            const cloudGroup = new THREE.Group();
            
            // Create several spheres to form a cloud
            const numPuffs = 5 + Math.floor(Math.random() * 4);
            for (let i = 0; i < numPuffs; i++) {
                const puffGeometry = new THREE.SphereGeometry(1 + Math.random() * 0.5, 16, 16);
                const puffMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xffffff,
                    roughness: 0.9,
                    metalness: 0.1
                });
                const puff = new THREE.Mesh(puffGeometry, puffMaterial);
                
                // Position puffs randomly but close to each other
                puff.position.set(
                    Math.random() * 2 - 1,
                    Math.random() * 0.5,
                    Math.random() * 2 - 1
                );
                
                cloudGroup.add(puff);
            }
            
            cloudGroup.position.set(x, y, z);
            return cloudGroup;
        }
        
        // Add several clouds to the scene
        for (let i = 0; i < 8; i++) {
            const cloud = createCloud(
                Math.random() * 60 - 30,
                15 + Math.random() * 5,
                Math.random() * 20 - 30
            );
            scene.add(cloud);
        }
        
        // Create the main bouncing ball with face
        const ballGeometry = new THREE.SphereGeometry(8, 32, 32);
        const ballMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xff4040, // Bright red
            roughness: 0.3, 
            metalness: 0.2 
        });
        const ball = new THREE.Mesh(ballGeometry, ballMaterial);
        ball.position.set(0, 8, -20);
        scene.add(ball);
        
        // No eyes or smile for the ball - just a plain red ball
        
        // Camera setup
        camera.position.set(0, 10, 30);
        camera.lookAt(0, 0, -20);
        
        // Animation variables
        let time = 0;
        const ballHoverSpeed = 0.8;
        const ballRotationSpeed = 0.2;
        const cameraOrbitSpeed = 0.15;
        
        // Animate function
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.01;
            
            // Make the ball hover up and down
            ball.position.y = 8 + Math.sin(time * ballHoverSpeed) * 1.5;
            
            // Rotate the ball slightly
            ball.rotation.y += 0.002 * ballRotationSpeed;
            
            // Orbit camera slightly around the ball
            const cameraRadius = 30;
            const cameraHeight = 10 + Math.sin(time * 0.3) * 2;
            camera.position.x = Math.sin(time * cameraOrbitSpeed) * cameraRadius;
            camera.position.z = Math.cos(time * cameraOrbitSpeed) * cameraRadius - 10;
            camera.position.y = cameraHeight;
            camera.lookAt(0, ball.position.y, -20);
            
            // Animate clouds
            scene.children.forEach(child => {
                if (child.isGroup) { // Identify clouds
                    child.position.x += Math.sin(time + child.position.z) * 0.01;
                    child.position.y += Math.cos(time + child.position.x) * 0.005;
                }
            });
            
            // Render the scene
            renderer.render(scene, camera);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Start animation
        animate();
    </script>
</body>
</html>
