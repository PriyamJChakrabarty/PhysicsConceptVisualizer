<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Pendulum Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.7/dat.gui.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
        }
        canvas {
            display: block;
        }
        .info-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 280px;
            border: 3px solid #9C27B0;
            z-index: 100;
        }
        .info-panel h2 {
            margin-top: 0;
            color: #6A1B9A;
            font-size: 20px;
            text-align: center;
        }
        .info-panel p {
            margin: 8px 0;
            color: #333;
            font-size: 14px;
        }
        .equation {
            font-style: italic;
            font-weight: bold;
            color: #0277BD;
        }
        .controls-info {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border: 2px solid #4CAF50;
            font-size: 14px;
            color: #333;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h2>Simple Pendulum</h2>
        <p><span class="equation">T = 2π√(L/g)</span> - Period</p>
        <p><span class="equation">θ = θ₀cos(ωt)</span> - Angular position</p>
        <p><span class="equation">ω = √(g/L)</span> - Angular frequency</p>
        <p><span class="equation">E = mgh + ½mv²</span> - Total energy</p>
        <div id="live-data">
            <p>Period: <span id="period">0</span> s</p>
            <p>Angle: <span id="angle">0</span>°</p>
            <p>Angular Velocity: <span id="angular-velocity">0</span> rad/s</p>
            <p>Energy: <span id="energy">0</span> J</p>
        </div>
    </div>
    <div class="controls-info">
        Click and drag to rotate the view. Scroll to zoom in/out.
    </div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Pure skyblue background
        
        // Camera setup
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 12);
        
        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.near = 0.1;
        directionalLight.shadow.camera.far = 50;
        directionalLight.shadow.camera.left = -10;
        directionalLight.shadow.camera.right = 10;
        directionalLight.shadow.camera.top = 10;
        directionalLight.shadow.camera.bottom = -10;
        scene.add(directionalLight);

        // Add a point light to make the scene more vibrant
        const pointLight = new THREE.PointLight(0xffffcc, 0.8, 20);
        pointLight.position.set(3, 5, 5);
        scene.add(pointLight);

        // Grid helper for scale reference
        const gridHelper = new THREE.GridHelper(20, 20, 0x888888, 0xCCCCCC);
        gridHelper.position.set(0, -10, 0);
        scene.add(gridHelper);
        
        // Create a colorful background plane
        const groundGeometry = new THREE.PlaneGeometry(40, 40);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x7cfc00, // Light green
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.set(0, -10, 0);
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Add decorative elements to make the scene more interesting
        // Add some clouds in the background
        function createCloud(x, y, z, scale) {
            const cloudGroup = new THREE.Group();
            const cloudMaterial = new THREE.MeshStandardMaterial({
                color: 0xFFFFFF,
                roughness: 0.7,
                metalness: 0.1
            });
            
            // Create puffs
            for (let i = 0; i < 5; i++) {
                const radius = 0.6 + Math.random() * 0.4;
                const cloudGeometry = new THREE.SphereGeometry(radius, 16, 16);
                const puff = new THREE.Mesh(cloudGeometry, cloudMaterial);
                puff.position.set(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 0.8,
                    (Math.random() - 0.5) * 1.2
                );
                cloudGroup.add(puff);
            }
            
            cloudGroup.position.set(x, y, z);
            cloudGroup.scale.set(scale, scale, scale);
            scene.add(cloudGroup);
            
            // Add slight animation
            return cloudGroup;
        }
        
        // Create several clouds
       // Create several clouds - positioned farther away
const clouds = [
    createCloud(-18, 4, -30, 3),
    createCloud(22, 7, -35, 4),
    createCloud(8, 10, -40, 5),
    createCloud(-12, 12, -45, 6)
];

        // Create the ceiling support for pendulum
        const ceilingGeometry = new THREE.BoxGeometry(12, 0.5, 2);
        const ceilingMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const ceiling = new THREE.Mesh(ceilingGeometry, ceilingMaterial);
        ceiling.position.set(0, 5, 3);
        ceiling.castShadow = true;
        ceiling.receiveShadow = true;
        scene.add(ceiling);

        // Create pendulum pivot point
        const pivotGeometry = new THREE.CylinderGeometry(0.2, 0.2, 0.8, 32);
        const pivotMaterial = new THREE.MeshStandardMaterial({ color: 0x4a4a4a });
        const pivot = new THREE.Mesh(pivotGeometry, pivotMaterial);
        pivot.position.set(0, 4.75, 3);
        pivot.rotation.x = Math.PI / 2;
        pivot.castShadow = true;
        pivot.receiveShadow = true;
        scene.add(pivot);

        // Create pendulum group
        const pendulumGroup = new THREE.Group();
        scene.add(pendulumGroup);
        pendulumGroup.position.set(0, 5, 3); // Align with the ceiling and bring forward

        // Create pendulum string/rod
        let pendulumString;
        function createPendulumString(length) {
            if (pendulumString) pendulumGroup.remove(pendulumString);
            
            const stringGeometry = new THREE.CylinderGeometry(0.05, 0.05, length, 8);
            const stringMaterial = new THREE.MeshStandardMaterial({ 
                color: params.stringType === 'rod' ? 0x8B4513 : 0xDDDDDD,
                roughness: params.stringType === 'rod' ? 0.7 : 0.3,
                metalness: params.stringType === 'rod' ? 0.3 : 0.0
            });
            pendulumString = new THREE.Mesh(stringGeometry, stringMaterial);
            
            // Position the string to hang down
            pendulumString.position.y = -length/2;
            pendulumString.castShadow = true;
            
            pendulumGroup.add(pendulumString);
        }

        // Create pendulum bob
        let pendulumBob;
        function createPendulumBob(mass) {
            if (pendulumBob) pendulumGroup.remove(pendulumBob);
            
            // Calculate radius based on mass (assuming uniform density)
            const radius = Math.pow(mass, 1/3) * 0.5;
            
            // Create group for the bob and face
            pendulumBob = new THREE.Group();
            
            // Create the main bob sphere
            const bobGeometry = new THREE.SphereGeometry(radius, 32, 32);
            const bobMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x9C27B0, // Purple
                roughness: 0.5,
                metalness: 0.3
            });
            const bobMesh = new THREE.Mesh(bobGeometry, bobMaterial);
            bobMesh.castShadow = true;
            pendulumBob.add(bobMesh);
            
            // Add googly eyes for fun
            const eyeGeometry = new THREE.SphereGeometry(radius * 0.3, 32, 32);
            const eyeWhiteMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const eyeBlackMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
            
            // Left eye
            const leftEyeWhite = new THREE.Mesh(eyeGeometry, eyeWhiteMaterial);
            leftEyeWhite.position.set(radius * 0.4, 0, radius * 0.7);
            leftEyeWhite.scale.set(1, 1, 0.5);
            pendulumBob.add(leftEyeWhite);
            
            const leftEyePupil = new THREE.Mesh(
                new THREE.SphereGeometry(radius * 0.15, 32, 32),
                eyeBlackMaterial
            );
            leftEyePupil.position.set(0, 0, radius * 0.01);
            leftEyeWhite.add(leftEyePupil);
            
            // Right eye
            const rightEyeWhite = new THREE.Mesh(eyeGeometry, eyeWhiteMaterial);
            rightEyeWhite.position.set(-radius * 0.4, 0, radius * 0.7);
            rightEyeWhite.scale.set(1, 1, 0.5);
            pendulumBob.add(rightEyeWhite);
            
            const rightEyePupil = new THREE.Mesh(
                new THREE.SphereGeometry(radius * 0.15, 32, 32),
                eyeBlackMaterial
            );
            rightEyePupil.position.set(0, 0, radius * 0.01);
            rightEyeWhite.add(rightEyePupil);
            
            // Add mouth - different expressions based on motion
           // Add mouth - always smiling with a more pronounced smile
const mouthGeometry = new THREE.TorusGeometry(radius * 0.5, radius * 0.08, 16, 32, Math.PI);
const mouthMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
const mouth = new THREE.Mesh(mouthGeometry, mouthMaterial);
mouth.position.set(0, -radius * 0.25, radius * 0.7);
mouth.rotation.x = Math.PI / 2;
mouth.rotation.y = 2*Math.PI; // This rotation makes it smile
            pendulumBob.add(mouth);
            
            // Position the bob at the end of the string
            pendulumBob.position.y = -params.length;
            
            pendulumGroup.add(pendulumBob);
        }

        // Create vectors for visualization
        let velocityArrow, accelerationArrow;
        function createVectors() {
            // Create arrow helper for velocity (tangential)
            const velocityDir = new THREE.Vector3(1, 0, 0);
            velocityDir.normalize();
            velocityArrow = new THREE.ArrowHelper(
                velocityDir, 
                new THREE.Vector3(0, -params.length, 0), 
                2, 
                0x00ff00, 
                0.3, 
                0.2
            );
            velocityArrow.visible = params.showVectors;
            pendulumGroup.add(velocityArrow);
            
            // Create arrow helper for acceleration
            const accelerationDir = new THREE.Vector3(0, 1, 0);
            accelerationDir.normalize();
            accelerationArrow = new THREE.ArrowHelper(
                accelerationDir, 
                new THREE.Vector3(0, -params.length, 0), 
                2, 
                0xff0000, 
                0.3, 
                0.2
            );
            accelerationArrow.visible = params.showVectors;
            pendulumGroup.add(accelerationArrow);
        }

        // Trail effect
        const trailPoints = [];
        const trailGeometry = new THREE.BufferGeometry();
        const trailMaterial = new THREE.LineBasicMaterial({ color: 0x9C27B0, linewidth: 2 });
        const trail = new THREE.Line(trailGeometry, trailMaterial);
        scene.add(trail);

        // Function to update trail
        function updateTrail() {
            if (trailPoints.length > 150) {
                trailPoints.shift(); // Remove oldest point
            }
            
            // Get position in world space
            const bobPosition = new THREE.Vector3();
            pendulumBob.getWorldPosition(bobPosition);
            
            trailPoints.push(bobPosition.clone());
            
            // Update trail geometry
            const positions = new Float32Array(trailPoints.length * 3);
            for (let i = 0; i < trailPoints.length; i++) {
                positions[i * 3] = trailPoints[i].x;
                positions[i * 3 + 1] = trailPoints[i].y;
                positions[i * 3 + 2] = trailPoints[i].z;
            }
            
            trailGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            trail.visible = params.showTrail;
        }

        // Parameters for pendulum
        const params = {
            length: 5,            // meters
            initialAngle: 30,     // degrees
            mass: 1.0,            // kg
            gravity: 9.81,        // m/s²
            damping: 0.05,        // damping factor
            stringType: 'string', // string or rod
            showVectors: true,
            showTrail: true,
            pauseMotion: false,
            resetSimulation: function() {
                angle = THREE.MathUtils.degToRad(params.initialAngle);
                angularVelocity = 0;
                pendulumGroup.rotation.z = angle;
                trailPoints.length = 0;
                updateTrail();
            }
        };

        // Add orbit controls for camera
        const OrbitControls = function(object, domElement) {
            this.object = object;
            this.domElement = domElement;
            
            // Rotation properties
            this.rotateSpeed = 1.0;
            this.zoomSpeed = 1.2;
            
            // Internal state
            const scope = this;
            const STATE = { NONE: -1, ROTATE: 0, ZOOM: 1 };
            let state = STATE.NONE;
            
            // Initial position
            const position0 = new THREE.Vector3();
            position0.copy(object.position);
            
            // Events
            const onMouseDown = function(event) {
                event.preventDefault();
                
                if (event.button === 0) {
                    state = STATE.ROTATE;
                }
                
                document.addEventListener('mousemove', onMouseMove, false);
                document.addEventListener('mouseup', onMouseUp, false);
            };
            
            const onMouseMove = function(event) {
                event.preventDefault();
                
                if (state === STATE.ROTATE) {
                    const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
                    const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;
                    
                    const rotSpeed = 0.002 * scope.rotateSpeed;
                    
                    // Rotate around Y axis (horizontal movement)
                    scope.object.position.x = position0.x * Math.cos(movementX * rotSpeed) - position0.z * Math.sin(movementX * rotSpeed);
                    scope.object.position.z = position0.z * Math.cos(movementX * rotSpeed) + position0.x * Math.sin(movementX * rotSpeed);
                    
                    // Rotate around X axis (vertical movement)
                    const elevation = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, movementY * rotSpeed));
                    scope.object.position.y = position0.y - elevation * 5;
                    
                    scope.object.lookAt(new THREE.Vector3(0, 0, 0));
                }
            };
            
            const onMouseUp = function() {
                document.removeEventListener('mousemove', onMouseMove, false);
                document.removeEventListener('mouseup', onMouseUp, false);
                state = STATE.NONE;
                
                // Update position0
                position0.copy(scope.object.position);
            };
            
            const onMouseWheel = function(event) {
                event.preventDefault();
                
                let delta = 0;
                
                if (event.wheelDelta) {
                    // WebKit / Opera / Explorer 9
                    delta = event.wheelDelta;
                } else if (event.detail) {
                    // Firefox
                    delta = -event.detail;
                }
                
                const zoomFactor = 0.1 * scope.zoomSpeed;
                
                if (delta > 0) {
                    // Zoom in
                    scope.object.position.multiplyScalar(1 - zoomFactor);
                } else {
                    // Zoom out
                    scope.object.position.multiplyScalar(1 + zoomFactor);
                }
                
                position0.copy(scope.object.position);
            };
            
            // Event listeners
            this.domElement.addEventListener('mousedown', onMouseDown, false);
            this.domElement.addEventListener('wheel', onMouseWheel, false);
            this.domElement.addEventListener('DOMMouseScroll', onMouseWheel, false); // Firefox
            
            this.update = function() {
                scope.object.lookAt(new THREE.Vector3(0, 0, 0));
            };
        };
        
        const controls = new OrbitControls(camera, renderer.domElement);

        // Handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Initialize scene
        function initializeScene() {
            createPendulumString(params.length);
            createPendulumBob(params.mass);
            createVectors();
            
            // Set initial angle
            angle = THREE.MathUtils.degToRad(params.initialAngle);
            pendulumGroup.rotation.z = angle;
            
            // Reset trail
            trailPoints.length = 0;
            updateTrail();
        }

        // Create GUI and position it
        const gui = new dat.GUI({ width: 300 });
        gui.domElement.style.position = 'absolute';
        gui.domElement.style.top = '10px';
        gui.domElement.style.left = '10px';
        gui.add(params, 'length', 1, 10).name('Length (m)').onChange(function(value) {
            createPendulumString(value);
            pendulumBob.position.y = -value;
            params.resetSimulation();
        });
        
        gui.add(params, 'initialAngle', 5, 80).name('Initial Angle (°)').onChange(function(value) {
            params.resetSimulation();
        });
        
        gui.add(params, 'mass', 0.1, 5).name('Mass (kg)').onChange(function(value) {
            createPendulumBob(value);
            pendulumBob.position.y = -params.length;
        });
        
        gui.add(params, 'gravity', 1, 20).name('Gravity (m/s²)');
        gui.add(params, 'damping', 0, 0.2).name('Damping');
        
        gui.add(params, 'stringType', ['string', 'rod']).name('Connection Type').onChange(function() {
            createPendulumString(params.length);
        });
        
        gui.add(params, 'showVectors').name('Show Vectors').onChange(function(value) {
            velocityArrow.visible = value;
            accelerationArrow.visible = value;
        });
        
        gui.add(params, 'showTrail').name('Show Trail');
        gui.add(params, 'pauseMotion').name('Pause Motion');
        gui.add(params, 'resetSimulation').name('Reset');

        // Variables for physics simulation
        let clock = new THREE.Clock();
        let angle = THREE.MathUtils.degToRad(params.initialAngle);
        let angularVelocity = 0;
        let angularAcceleration = 0;

        // Function to update physics display
        function updatePhysicsDisplay() {
            // Calculate the period based on length and gravity (small angle approximation)
            const period = 2 * Math.PI * Math.sqrt(params.length / params.gravity);
            
            // Current angle in degrees
            const angleDeg = THREE.MathUtils.radToDeg(angle);
            
            // Calculate energy
            // Potential energy = mgh = m * g * h
            // where h = L * (1 - cos(θ))
            const h = params.length * (1 - Math.cos(angle));
            const potentialEnergy = params.mass * params.gravity * h;
            
            // Kinetic energy = (1/2) * m * v²
            // where v = L * ω
            const velocity = params.length * Math.abs(angularVelocity);
            const kineticEnergy = 0.5 * params.mass * velocity * velocity;
            
            // Total energy
            const totalEnergy = potentialEnergy + kineticEnergy;
            
            // Update display
            document.getElementById('period').textContent = period.toFixed(2);
            document.getElementById('angle').textContent = angleDeg.toFixed(2);
            document.getElementById('angular-velocity').textContent = angularVelocity.toFixed(2);
            document.getElementById('energy').textContent = totalEnergy.toFixed(2);
            
            // Update vector arrows
            if (velocityArrow && accelerationArrow) {
                // Set velocity arrow direction tangential to the pendulum motion
                const velocityDir = new THREE.Vector3(
                    Math.cos(angle + Math.PI/2), 
                    Math.sin(angle + Math.PI/2), 
                    0
                );
                velocityDir.normalize();
                velocityArrow.setDirection(velocityDir);
                velocityArrow.setLength(Math.abs(angularVelocity) * params.length * 0.5);
                
                // Set acceleration arrow toward pivot point
                const accelerationDir = new THREE.Vector3(
                    -Math.sin(angle), 
                    Math.cos(angle), 
                    0
                );
                accelerationDir.normalize();
                accelerationArrow.setDirection(accelerationDir);
                accelerationArrow.setLength(Math.abs(angularAcceleration) * 2);
            }
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = Math.min(clock.getDelta(), 0.1); // Limit delta to avoid physics issues
            
            if (!params.pauseMotion) {
                // Calculate angular acceleration: α = -(g/L) * sin(θ)
                angularAcceleration = -(params.gravity / params.length) * Math.sin(angle);
                
                // Apply damping
                angularVelocity += angularAcceleration * delta;
                angularVelocity *= (1 - params.damping * delta);
                
                // Update angle
                angle += angularVelocity * delta;
                
                // Update pendulum position
                pendulumGroup.rotation.z = angle;
                
                // Update mouth expression based on motion
                // Always make the pendulum bob smile
if (pendulumBob) {
    const mouth = pendulumBob.children.find(child => child instanceof THREE.Mesh && 
                               child.geometry instanceof THREE.TorusGeometry);
    if (mouth) {
        // Always smile
        mouth.rotation.y = Math.PI;
    }
                    
                    // Make eyes look dizzy during fast swings
                    pendulumBob.children.forEach(eye => {
                        if (eye instanceof THREE.Mesh && eye.children.length > 0) {
                            // Make pupils follow the motion for a dizzy effect
                            const pupil = eye.children[0];
                            const eyeAngle = angle * 2;
                            const pupilRadius = 0.03;
                            pupil.position.x = Math.sin(eyeAngle) * pupilRadius;
                            pupil.position.y = Math.cos(eyeAngle) * pupilRadius;
                        }
                    });
                }
                
                // Update trail if needed
                if (params.showTrail && clock.elapsedTime % 0.05 < delta) {
                    updateTrail();
                }
            }
            
            // Animate clouds
            clouds.forEach((cloud, index) => {
                cloud.position.x += 0.01 * (index % 2 === 0 ? 1 : -1);
                
                // Reset position if cloud moves too far
               // Reset position if cloud moves too far (wider boundaries)
if (cloud.position.x > 40) cloud.position.x = -40;
if (cloud.position.x < -40) cloud.position.x = 40;
            });
            
            // Update physics display
            updatePhysicsDisplay();
            
            renderer.render(scene, camera);
        }

        // Initialize and start animation
        initializeScene();
        animate();
    </script>
</body>
</html>
