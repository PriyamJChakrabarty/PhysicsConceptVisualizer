<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring-Mass System Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.7/dat.gui.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
        }
        canvas {
            display: block;
        }
        .info-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 250px;
            border: 3px solid #FF9800;
        }
        .info-panel h2 {
            margin-top: 0;
            color: #FF5722;
            font-size: 20px;
            text-align: center;
        }
        .info-panel p {
            margin: 8px 0;
            color: #333;
            font-size: 14px;
        }
        .equation {
            font-style: italic;
            font-weight: bold;
            color: #0277BD;
        }
        .controls-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border: 2px solid #4CAF50;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h2>Spring-Mass System</h2>
        <p><span class="equation">F = -kx</span> - Hooke's Law</p>
        <p><span class="equation">ω = √(k/m)</span> - Angular frequency</p>
        <p><span class="equation">T = 2π/ω = 2π√(m/k)</span> - Period</p>
        <p><span class="equation">x = A·cos(ωt+φ)</span> - Position</p>
        <div id="live-data">
            <p>Position: <span id="position">0</span> m</p>
            <p>Velocity: <span id="velocity">0</span> m/s</p>
            <p>Acceleration: <span id="acceleration">0</span> m/s²</p>
            <p>Period: <span id="period">0</span> s</p>
            <p>Energy: <span id="energy">0</span> J</p>
        </div>
    </div>
    <div class="controls-info">
        Click and drag to rotate the view. Scroll to zoom in/out.
    </div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xE0F7FA);
        
        // Camera setup
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        
        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.near = 0.1;
        directionalLight.shadow.camera.far = 50;
        directionalLight.shadow.camera.left = -10;
        directionalLight.shadow.camera.right = 10;
        directionalLight.shadow.camera.top = 10;
        directionalLight.shadow.camera.bottom = -10;
        scene.add(directionalLight);

        // Grid helper for scale reference
        // const gridHelper = new THREE.GridHelper(30, 30, 0x888888, 0xCCCCCC);
        // scene.add(gridHelper);
        
        // Create a plane as the ground
        const groundGeometry = new THREE.PlaneGeometry(50, 50);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x7cfc00, // Light green
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -10; // Lower the ground
        ground.receiveShadow = true;
        scene.add(ground);



        // Add factory buildings in the background
        function createFactoryBuildings() {
    const factoryGroup = new THREE.Group();
    
    // Factory 1
    const factory1 = createFactory(0xA0522D, 3, 4, 5, 10, -8, -15);
    factoryGroup.add(factory1);
    
    // Factory 2
    const factory2 = createFactory(0x8B4513, 4, 3, 4, 15, -8.5, -18);
    factoryGroup.add(factory2);
    
    // Factory 3
    const factory3 = createFactory(0x654321, 3, 5, 3, 20, -7.5, -10);
    factoryGroup.add(factory3);
    
    scene.add(factoryGroup);
    
    // Create smoke particles for each factory
    createSmokeParticles(factory1, 10, -4, -15);
    createSmokeParticles(factory2, 15, -5.5, -18);
    createSmokeParticles(factory3, 20, -2.5, -10);
}
        // Helper function to create a factory building
        function createFactory(color, width, height, depth, x, y, z) {
            const factory = new THREE.Group();
            
            // Main building
            const buildingGeometry = new THREE.BoxGeometry(width, height, depth);
            const buildingMaterial = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.7,
                metalness: 0.2
            });
            const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
            building.position.set(0, height/2, 0);
            building.castShadow = true;
            building.receiveShadow = true;
            factory.add(building);
            
            // Roof
            const roofGeometry = new THREE.ConeGeometry(width/1.5, height/2, 4);
            const roofMaterial = new THREE.MeshStandardMaterial({
                color: 0x8B0000, // Dark red
                roughness: 0.8,
                metalness: 0.1
            });
            const roof = new THREE.Mesh(roofGeometry, roofMaterial);
            roof.position.set(0, height + height/4, 0);
            roof.rotation.y = Math.PI / 4;
            roof.castShadow = true;
            factory.add(roof);
            
            // Chimney
            const chimneyGeometry = new THREE.CylinderGeometry(width/8, width/6, height/1.5, 8);
            const chimneyMaterial = new THREE.MeshStandardMaterial({
                color: 0x696969, // Dark gray
                roughness: 0.9,
                metalness: 0.1
            });
            const chimney = new THREE.Mesh(chimneyGeometry, chimneyMaterial);
            chimney.position.set(width/4, height + height/4, depth/4);
            chimney.castShadow = true;
            factory.add(chimney);
            
            // Position the entire factory
            factory.position.set(x, y, z);
            
            return factory;
        }

        // Create smoke particles
        function createSmokeParticles(factory, x, y, z) {
            const smokeParticles = new THREE.Group();
            const particleCount = 15;
            
            for (let i = 0; i < particleCount; i++) {
                const smokeGeometry = new THREE.SphereGeometry(0.2, 8, 8);
                const smokeMaterial = new THREE.MeshStandardMaterial({
                    color: 0xDDDDDD,
                    transparent: true,
                    opacity: 0.7,
                    roughness: 1.0,
                    metalness: 0.0
                });
                
                const smokeParticle = new THREE.Mesh(smokeGeometry, smokeMaterial);
                
                // Random initial position above chimney
                smokeParticle.position.set(
                    x + Math.random() * 0.3 - 0.15,
                    y + factory.position.y + Math.random() * 0.5,
                    z + Math.random() * 0.3 - 0.15
                );
                
                // Store animation parameters
                smokeParticle.userData.velocity = new THREE.Vector3(
                    Math.random() * 0.01 - 0.005,
                    Math.random() * 0.05 + 0.05,
                    Math.random() * 0.01 - 0.005
                );
                smokeParticle.userData.age = 0;
                smokeParticle.userData.maxAge = 5 + Math.random() * 5; // Random lifespan
                
                smokeParticles.add(smokeParticle);
            }
            
            scene.add(smokeParticles);
            
            // Return the group for animation
            return smokeParticles;
        }

        // Update smoke particles
        function updateSmoke() {
            scene.children.forEach(child => {
                if (child instanceof THREE.Group) {
                    child.children.forEach(subChild => {
                        if (subChild instanceof THREE.Mesh && 
                            subChild.material && 
                            subChild.material.opacity !== undefined && 
                            subChild.userData.velocity) {
                            
                            // Update position
                            subChild.position.add(subChild.userData.velocity);
                            
                            // Update age
                            subChild.userData.age += 0.016; // Approx frame time
                            
                            // Grow slightly
                            subChild.scale.addScalar(0.005);
                            
                            // Fade out
                            subChild.material.opacity = 0.7 * (1 - subChild.userData.age / subChild.userData.maxAge);
                            
                            // Reset if too old
                            if (subChild.userData.age >= subChild.userData.maxAge) {
                                // Find the factory this smoke belongs to
                                let factoryIndex = -1;
                                if (subChild.position.z < -15) factoryIndex = 0;
                                else if (subChild.position.z < -12) factoryIndex = 1;
                                else factoryIndex = 2;
                                
                                const positions = [
                                    [10, -4, -15],
                                    [15, -5.5, -18],
                                    [20, -2.5, -10]
                                ];
                                
                                // Reset position
                                subChild.position.set(
                                    positions[factoryIndex][0] + Math.random() * 0.3 - 0.15,
                                    positions[factoryIndex][1] + Math.random() * 0.5,
                                    positions[factoryIndex][2] + Math.random() * 0.3 - 0.15
                                );
                                
                                // Reset properties
                                subChild.userData.age = 0;
                                subChild.userData.maxAge = 5 + Math.random() * 5;
                                subChild.scale.set(1, 1, 1);
                                subChild.material.opacity = 0.7;
                            }
                        }
                    });
                }
            });
        }



        // Create the wall to attach the spring
        const wallGeometry = new THREE.BoxGeometry(2, 12, 10);
        const wallMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xa0522d, // Brown
            roughness: 0.7,
            metalness: 0.2
        });
        const wall = new THREE.Mesh(wallGeometry, wallMaterial);
        wall.position.set(-8, 0, 0);
        wall.castShadow = true;
        wall.receiveShadow = true;
        scene.add(wall);
        
        // Create the spring
        let spring;
        function createSpring(restLength, coils, radius) {
            if (spring) scene.remove(spring);
            
            spring = new THREE.Group();
            
            // Spring anchor point (fixed to wall)
            const anchorGeometry = new THREE.SphereGeometry(0.3, 16, 16);
            const anchorMaterial = new THREE.MeshStandardMaterial({ color: 0x696969 }); // Dark gray
            const anchor = new THREE.Mesh(anchorGeometry, anchorMaterial);
            anchor.position.set(-7, 0, 0); // Positioned on the wall
            anchor.castShadow = true;
            spring.add(anchor);
            
            // Get current displacement for spring length
            const currentLength = position > 0 ? position : 0.5; // Minimum spring length to prevent collapse
            
            // Create the actual spring coil
            const springGeometry = new THREE.TubeGeometry(
                new CustomSpringCurve(currentLength, coils, radius, restLength),
                64, // tubular segments
                0.2, // radius of tube
                8, // radial segments
                false // closed
            );
            const springMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xC0C0C0, // Silver
                roughness: 0.3,
                metalness: 0.8
            });
            const springCoil = new THREE.Mesh(springGeometry, springMaterial);
            springCoil.castShadow = true;
            spring.add(springCoil);
            
            scene.add(spring);
        }
        
        // Custom curve for spring geometry
        class CustomSpringCurve extends THREE.Curve {
            constructor(currentLength, coils, radius, restLength) {
                super();
                this.currentLength = currentLength;
                this.coils = coils;
                this.radius = radius;
                this.restLength = restLength;
            }
            
            getPoint(t) {
                const angle = this.coils * Math.PI * 2 * t;
                const x = -7 + this.currentLength * t - 0.8; // Start at anchor, extend to actual length
                const y = Math.sin(angle) * this.radius;
                const z = Math.cos(angle) * this.radius;
                return new THREE.Vector3(x, y, z);
            }
        }

        // Create the mass (with character)
        let mass;
        function createMass(massValue) {
            if (mass) scene.remove(mass);
            
            mass = new THREE.Group();
            
            // Base sphere for the mass
            const radius = Math.pow(massValue, 1/3) * 0.6;  // Scale radius based on mass
            const massGeometry = new THREE.SphereGeometry(radius, 32, 32);
            const massMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xff9800, // Orange
                roughness: 0.5,
                metalness: 0.3
            });
            const massBody = new THREE.Mesh(massGeometry, massMaterial);
            massBody.castShadow = true;
            massBody.receiveShadow = true;
            mass.add(massBody);
            
            // Add googly eyes for cartoonish look
            const eyeGeometry = new THREE.SphereGeometry(radius * 0.3, 32, 32);
            const eyeWhiteMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const eyeBlackMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
            
            // Left eye
            const leftEyeWhite = new THREE.Mesh(eyeGeometry, eyeWhiteMaterial);
            leftEyeWhite.position.set(radius * 0.5, radius * 0.4, radius * 0.7);
            leftEyeWhite.scale.set(1, 1, 0.5);
            massBody.add(leftEyeWhite);
            
            const leftEyePupil = new THREE.Mesh(
                new THREE.SphereGeometry(radius * 0.15, 32, 32),
                eyeBlackMaterial
            );
            leftEyePupil.position.set(0, 0, radius * 0.3);
            leftEyeWhite.add(leftEyePupil);
            
            // Right eye
            const rightEyeWhite = new THREE.Mesh(eyeGeometry, eyeWhiteMaterial);
            rightEyeWhite.position.set(-radius * 0.5, radius * 0.4, radius * 0.7);
            rightEyeWhite.scale.set(1, 1, 0.5);
            massBody.add(rightEyeWhite);
            
            const rightEyePupil = new THREE.Mesh(
                new THREE.SphereGeometry(radius * 0.15, 32, 32),
                eyeBlackMaterial
            );
            rightEyePupil.position.set(0, 0, radius * 0.3);
            rightEyeWhite.add(rightEyePupil);
            
            // Add mouth - expression will change based on velocity
            const mouthGeometry = new THREE.TorusGeometry(radius * 0.4, radius * 0.07, 16, 32, Math.PI);
            const mouthMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const mouth = new THREE.Mesh(mouthGeometry, mouthMaterial);
            mouth.position.set(0, -radius * 0.2, radius * 0.7);
            mouth.rotation.x = Math.PI / 2;
            mouth.rotation.y = Math.PI;
            massBody.add(mouth);
            
            // Position the mass at the end of the spring
            mass.position.set(-7 + params.restLength, 0, 0);
            
            scene.add(mass);
        }
        
        // Create equilibrium position indicator
        function createEquilibriumIndicator(restLength) {
            const geometry = new THREE.BoxGeometry(0.1, 5, 0.1);
            const material = new THREE.MeshStandardMaterial({ color: 0x00ff00 }); // Green
            const indicator = new THREE.Mesh(geometry, material);
            indicator.position.set(-7 + restLength, 0, 0);
            scene.add(indicator);
            return indicator;
        }
        
        // Force vector visualizations
        let springForceArrow, velocityArrow;
        function createVectors() {
            // Spring force arrow (points toward equilibrium)
            const springForceDir = new THREE.Vector3(-1, 0, 0);
            springForceDir.normalize();
            springForceArrow = new THREE.ArrowHelper(
                springForceDir, 
                new THREE.Vector3(0, 0, 0), 
                2, 
                0xff0000, // Red
                0.3, 
                0.2
            );
            springForceArrow.visible = params.showVectors;
            
            // Velocity arrow
            const velocityDir = new THREE.Vector3(1, 0, 0);
            velocityDir.normalize();
            velocityArrow = new THREE.ArrowHelper(
                velocityDir, 
                new THREE.Vector3(0, 0, 0), 
                2, 
                0x00ff00, // Green
                0.3, 
                0.2
            );
            velocityArrow.visible = params.showVectors;
            
            // Add arrows to mass object so they move with it
            mass.add(springForceArrow);
            mass.add(velocityArrow);
        }
        
        // Trail effect
        const trailPoints = [];
        const trailGeometry = new THREE.BufferGeometry();
        const trailMaterial = new THREE.LineBasicMaterial({ color: 0xff9800, linewidth: 2 });
        const trail = new THREE.Line(trailGeometry, trailMaterial);
        scene.add(trail);
        
        // Function to update trail points
        function updateTrail() {
            if (trailPoints.length > 100) {
                trailPoints.shift(); // Remove the oldest point
            }
            
            const position = mass.position.clone();
            trailPoints.push(position);
            
            // Update trail geometry
            const positions = new Float32Array(trailPoints.length * 3);
            for (let i = 0; i < trailPoints.length; i++) {
                positions[i * 3] = trailPoints[i].x;
                positions[i * 3 + 1] = trailPoints[i].y;
                positions[i * 3 + 2] = trailPoints[i].z;
            }
            
            trailGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            trail.visible = params.showTrail;
        }
        
        // Add rotation to camera
        function addOrbitControls() {
            const OrbitControls = function(object, domElement) {
                this.object = object;
                this.domElement = domElement;
                
                // Rotation properties
                this.rotateSpeed = 1.0;
                this.zoomSpeed = 1.2;
                
                // Internal state
                const scope = this;
                const STATE = { NONE: -1, ROTATE: 0, ZOOM: 1 };
                let state = STATE.NONE;
                
                // Initial position
                const position0 = new THREE.Vector3();
                position0.copy(object.position);
                
                // Events
                const onMouseDown = function(event) {
                    event.preventDefault();
                    
                    if (event.button === 0) {
                        state = STATE.ROTATE;
                    }
                    
                    document.addEventListener('mousemove', onMouseMove, false);
                    document.addEventListener('mouseup', onMouseUp, false);
                };
                
                const onMouseMove = function(event) {
                    event.preventDefault();
                    
                    if (state === STATE.ROTATE) {
                        const movementX = event.movementX || event.mozMovementX || event.webkitMovementX || 0;
                        const movementY = event.movementY || event.mozMovementY || event.webkitMovementY || 0;
                        
                        const rotSpeed = 0.002 * scope.rotateSpeed;
                        
                        // Rotate around Y axis (horizontal movement)
                        scope.object.position.x = position0.x * Math.cos(movementX * rotSpeed) - position0.z * Math.sin(movementX * rotSpeed);
                        scope.object.position.z = position0.z * Math.cos(movementX * rotSpeed) + position0.x * Math.sin(movementX * rotSpeed);
                        
                        // Rotate around X axis (vertical movement)
                        const elevation = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, movementY * rotSpeed));
                        scope.object.position.y = position0.y - elevation * 5;
                        
                        scope.object.lookAt(new THREE.Vector3(0, 0, 0));
                    }
                };
                
                const onMouseUp = function() {
                    document.removeEventListener('mousemove', onMouseMove, false);
                    document.removeEventListener('mouseup', onMouseUp, false);
                    state = STATE.NONE;
                    
                    // Update position0
                    position0.copy(scope.object.position);
                };
                
                const onMouseWheel = function(event) {
                    event.preventDefault();
                    
                    let delta = 0;
                    
                    if (event.wheelDelta) {
                        // WebKit / Opera / Explorer 9
                        delta = event.wheelDelta;
                    } else if (event.detail) {
                        // Firefox
                        delta = -event.detail;
                    }
                    
                    const zoomFactor = 0.1 * scope.zoomSpeed;
                    
                    if (delta > 0) {
                        // Zoom in
                        scope.object.position.multiplyScalar(1 - zoomFactor);
                    } else {
                        // Zoom out
                        scope.object.position.multiplyScalar(1 + zoomFactor);
                    }
                    
                    position0.copy(scope.object.position);
                };
                
                // Event listeners
                this.domElement.addEventListener('mousedown', onMouseDown, false);
                this.domElement.addEventListener('wheel', onMouseWheel, false);
                this.domElement.addEventListener('DOMMouseScroll', onMouseWheel, false); // Firefox
                
                this.update = function() {
                    scope.object.lookAt(new THREE.Vector3(0, 0, 0));
                };
            };
            
            controls = new OrbitControls(camera, renderer.domElement);
        }
        
        addOrbitControls();

        // Handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Parameters for spring-mass system
        const params = {
            mass: 1.0,  // kg
            springConstant: 5.0,  // N/m
            restLength: 5.0,  // m
            initialDisplacement: 2.0,  // m
            damping: 0.1,  // damping coefficient
            gravity: 0,  // m/s², set to 0 for horizontal spring
            showVectors: true,
            showTrail: true,
            pauseSimulation: false,
            resetSimulation: function() {
                // Reset simulation parameters
                position = params.restLength + params.initialDisplacement;
                velocity = 0;
                acceleration = 0;
                mass.position.set(-7 + position, 0, 0);
                trailPoints.length = 0;
                updateTrail();
                time = 0;
            },
            springType: 'ideal',  // ideal or real (with damping)
            coils: 10,  // number of coils in spring
            coilRadius: 0.5,  // radius of spring coils
        };

        // Equilibrium line
        let equilibriumIndicator;

        // GUI
        const gui = new dat.GUI({ width: 300 });
        gui.add(params, 'mass', 0.1, 5).name('Mass (kg)').onChange(function(value) {
            createMass(value);
            createVectors();
            
            // Update spring properties that depend on mass
            updateSpringProperties();
        });
        
        gui.add(params, 'springConstant', 1, 20).name('Spring Constant (N/m)').onChange(updateSpringProperties);
        gui.add(params, 'restLength', 3, 10).name('Rest Length (m)').onChange(function(value) {
            if (equilibriumIndicator) scene.remove(equilibriumIndicator);
            equilibriumIndicator = createEquilibriumIndicator(value);
            createSpring(value, params.coils, params.coilRadius);
            updateSpringProperties();
        });
        
        gui.add(params, 'initialDisplacement', -3, 3).name('Initial Displacement (m)');
        
        const springFolder = gui.addFolder('Spring Appearance');
        springFolder.add(params, 'coils', 3, 20).step(1).name('Number of Coils').onChange(function() {
            createSpring(params.restLength, params.coils, params.coilRadius);
        });
        
        springFolder.add(params, 'coilRadius', 0.1, 1).name('Coil Radius').onChange(function() {
            createSpring(params.restLength, params.coils, params.coilRadius);
        });
        
        const physicsFolder = gui.addFolder('Physics Parameters');
        physicsFolder.add(params, 'damping', 0, 1).name('Damping');
        physicsFolder.add(params, 'gravity', -9.81, 9.81).name('Gravity (m/s²)');
        physicsFolder.add(params, 'springType', ['ideal', 'real']).name('Spring Type');
        
        gui.add(params, 'showVectors').name('Show Force Vectors').onChange(function(value) {
            if (springForceArrow) springForceArrow.visible = value;
            if (velocityArrow) velocityArrow.visible = value;
        });
        
        gui.add(params, 'showTrail').name('Show Trail');
        gui.add(params, 'pauseSimulation').name('Pause Simulation');
        gui.add(params, 'resetSimulation').name('Reset Simulation');
        
        // Function to update spring-mass system properties
        function updateSpringProperties() {
            // Recalculate period and frequency based on mass and spring constant
            const angularFrequency = Math.sqrt(params.springConstant / params.mass);
            const period = 2 * Math.PI / angularFrequency;
            
            // Update display
            document.getElementById('period').textContent = period.toFixed(2);
        }

        // Variables for animation and physics
        let position = params.restLength + params.initialDisplacement;
        let velocity = 0;
        let acceleration = 0;
        let time = 0;
        let clock = new THREE.Clock();

        // Function to update physics values display
        function updatePhysicsDisplay() {
            // Calculate displacement from equilibrium
            const displacement = position - params.restLength;
            
            // Calculate physical quantities
            // Force = -k*x for spring force
            const springForce = -params.springConstant * displacement;
            
            // Update acceleration based on F = ma
            acceleration = springForce / params.mass;
            
            // Add gravity if enabled
            if (params.gravity !== 0) {
                // Only add gravity component along the spring axis
                // This is a simplification for visualization
                acceleration += params.gravity;
            }
            
            // Calculate energy
            const potentialEnergy = 0.5 * params.springConstant * displacement * displacement;
            const kineticEnergy = 0.5 * params.mass * velocity * velocity;
            const totalEnergy = potentialEnergy + kineticEnergy;
            
            // Update the display
            document.getElementById('position').textContent = displacement.toFixed(2);
            document.getElementById('velocity').textContent = velocity.toFixed(2);
            document.getElementById('acceleration').textContent = acceleration.toFixed(2);
            document.getElementById('energy').textContent = totalEnergy.toFixed(2);
            
            // Update vector arrows
            if (springForceArrow && velocityArrow) {
                // Spring force points toward equilibrium
                const forceDirection = new THREE.Vector3(displacement > 0 ? -1 : 1, 0, 0);
                springForceArrow.setDirection(forceDirection);
                springForceArrow.setLength(Math.min(Math.abs(springForce) * 0.2, 3));
                
                // Velocity arrow points in direction of movement
                const velocityDirection = new THREE.Vector3(velocity > 0 ? 1 : -1, 0, 0);
                velocityArrow.setDirection(velocityDirection);
                velocityArrow.setLength(Math.min(Math.abs(velocity) * 0.5, 3));
            }
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            if (!params.pauseSimulation) {
                const delta = Math.min(clock.getDelta(), 0.1); // Cap delta to avoid large jumps
                time += delta;
                
                // Calculate the new position and velocity based on spring physics
                const displacement = position - params.restLength;
                
                // Apply spring force F = -kx
                let springForce = -params.springConstant * displacement;
                
                // Add damping if using real spring
                if (params.springType === 'real') {
                    springForce -= params.damping * velocity;
                }
                
                // Add gravity if enabled (simplified to act along spring axis)
                if (params.gravity !== 0) {
                    springForce += params.mass * params.gravity;
                }
                
                // Calculate acceleration from F = ma
                acceleration = springForce / params.mass;
                
                // Update velocity and position using Euler integration
                velocity += acceleration * delta;
                position += velocity * delta;
                
                // Update mass position
                mass.position.set(-7 + position, 0, 0);
                
                // Update the spring by recreating it with current position
                createSpring(params.restLength, params.coils, params.coilRadius);
                
                // Update trail if needed
                if (params.showTrail && time % 0.05 < delta) {
                    updateTrail();
                }
                
                // Update smoke particles
                updateSmoke();
                
                // Update expressions based on motion
                if (mass && mass.children[0] && mass.children[0].children) {
                    // [existing expressions code...]
                }
            }
            
            // Update physics display
            updatePhysicsDisplay();
            
            renderer.render(scene, camera);
        }

        // Initialize and start animation
        function initializeScene() {
            // Initial position
            position = params.restLength + params.initialDisplacement;
            
            createSpring(params.restLength, params.coils, params.coilRadius);
            createMass(params.mass);
            equilibriumIndicator = createEquilibriumIndicator(params.restLength);
            createVectors();
            createFactoryBuildings(); // Add this line to create factory buildings
            
            // Set mass position
            mass.position.set(-7 + position, 0, 0);
            
            // Reset trail
            trailPoints.length = 0;
            updateTrail();
            
            // Initialize physics values
            updatePhysicsDisplay();
            updateSpringProperties();
        }

        // Initialize and start animation
        initializeScene();
        animate();
    </script>
